function render(term='') {
 term = term.toLowerCase();

 const matches = data.filter(r =>
   r.address.toLowerCase().includes(term) ||
   r.owner.toLowerCase().includes(term) ||
   r.card.toLowerCase().includes(term)
 );

 results.innerHTML = matches.map(r => {
   let color = 'gray';

   if(r.status === 'ENABLED') color = 'green';
   if(r.status === 'DISABLED') color = 'red';

   return `
   <div class="card">
      <div class="addr">${r.address}</div>
      <div class="owner">${r.owner}</div>
      <div>Card: ${r.card}</div>
      <div class="alert ${color}">
         Status: ${r.status}
      </div>
   </div>`;
 }).join('');
}
